name: PR Conventional Commits

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  build:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: webiny/action-conventional-commits@v1.3.1

      - name: Close PR on conventional commits failure
        if: failure()
        uses: peter-evans/close-pull@v3

      - name: Send email on conventional commits failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "PR closed: conventional commits check failed"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Conventional commits check failed for PR #${{ github.event.pull_request.number }}.
            Title: ${{ github.event.pull_request.title }}
            Author: ${{ github.event.pull_request.user.login }}
            URL: ${{ github.event.pull_request.html_url }}
